server:
  port: 5004
spring:
  application:
    name: job-portal-resume-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5433/job_portal_resume
    driver-class-name: org.postgresql.Driver
